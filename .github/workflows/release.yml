name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION_CODE=$(echo "$VERSION" | awk -F. '{print $1 * 10000 + $2 * 100 + $3}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          if [ -z "${{ secrets.SIGNING_KEY }}" ]; then
            echo "::error::SIGNING_KEY secret is empty or not configured"
            exit 1
          fi
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.keystore
          FILESIZE=$(stat -c%s app/release.keystore 2>/dev/null || stat -f%z app/release.keystore)
          if [ "$FILESIZE" -lt 100 ]; then
            echo "::error::Decoded keystore file is too small ($FILESIZE bytes), base64 content may be invalid"
            exit 1
          fi
          echo "Keystore decoded successfully ($FILESIZE bytes)"

      - name: Validate keystore
        run: |
          keytool -list -v -keystore app/release.keystore \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "::error::Keystore validation failed: wrong password or alias"
            exit 1
          fi
          echo "Keystore validation passed"

      - name: Build Release APK
        run: ./gradlew assembleRelease -PversionName=${{ steps.version.outputs.VERSION }} -PversionCode=${{ steps.version.outputs.VERSION_CODE }}
        env:
          KEYSTORE_PATH: app/release.keystore
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK signature
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "::error::Release APK not found at $APK"
            exit 1
          fi
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)/apksigner verify -v "$APK"
          echo "APK signature verification passed"

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PversionName=${{ steps.version.outputs.VERSION }} -PversionCode=${{ steps.version.outputs.VERSION_CODE }}

      - name: Rename Release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/DiUI-v${{ steps.version.outputs.VERSION }}.apk

      - name: Rename Debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/debug/DiUI-v${{ steps.version.outputs.VERSION }}-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiUI v${{ steps.version.outputs.VERSION }}
          body: |
            ## 迪UI v${{ steps.version.outputs.VERSION }}

            ### 下载安装
            - **签名版 APK**：`DiUI-v${{ steps.version.outputs.VERSION }}.apk`（推荐，可覆盖安装）
            - **调试版 APK**：`DiUI-v${{ steps.version.outputs.VERSION }}-debug.apk`（仅用于测试）

            > 调试版 APK 签名与正式版不同，不能覆盖安装正式版。

            ### 更新内容
            请查看下方自动生成的 commit 记录。
          files: |
            app/build/outputs/apk/release/DiUI-v${{ steps.version.outputs.VERSION }}.apk
            app/build/outputs/apk/debug/DiUI-v${{ steps.version.outputs.VERSION }}-debug.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
